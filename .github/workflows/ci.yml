name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dashboard JavaScript
        shell: pwsh
        run: node --check server/dashboard/app.js

      # Windows PowerShell 5.1 (not pwsh/PowerShell 7): this project's tests
      # touch System.Web.Extensions types that only resolve via the .NET
      # Framework GAC, which PowerShell 7's .NET Core runtime doesn't have -
      # pwsh reproducibly fails Test-InstallServerRefreshOnly with a
      # WebResourceAttribute load error unrelated to the code under test.
      # -SkipPublisherCheck/-Force are needed to replace Windows PowerShell
      # 5.1's own pre-installed Pester 3.4.0 (different signing cert) with
      # the modern version this suite requires.
      - name: Run PowerShell tests
        shell: powershell
        run: |
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -Force
          Invoke-Pester -Path .\tests\ -CI

      - name: Build server
        shell: pwsh
        run: |
          .\src\Build-Server.ps1
          .\build\WindowsInventoryLiteServer.exe --version

      - name: Build client
        shell: pwsh
        run: |
          .\src\Build-Client.ps1 -TargetFramework Net40 -OutputPath .\build\WindowsInventoryLiteClient-net40.exe
          .\build\WindowsInventoryLiteClient-net40.exe --version
